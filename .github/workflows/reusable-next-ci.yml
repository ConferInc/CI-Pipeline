# Reusable CI for Next.js apps (lint, typecheck, optional tests, build, secret scan).
# Caller: uses: org/CI-Pipeline/.github/workflows/reusable-next-ci.yml@main

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: string
        default: "20"
      working-directory:
        description: Directory containing package.json
        type: string
        default: "."
      run-tests:
        description: Run npm test (skip if your package.json has no test script)
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit

  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        if: inputs.run-tests
        run: npm test
      - name: Skip tests
        if: ${{ !inputs.run-tests }}
        run: echo "run-tests=false — skipping npm test"

  build:
    needs: [lint, typecheck, unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar xzf gitleaks_8.24.3_linux_x64.tar.gz
          EXIT_CODE=0
          ./gitleaks detect --source=. --verbose || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "::error::Gitleaks found secrets in this repository!"
            exit 1
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::Gitleaks encountered an error (exit 2), but no leaks were found. Continuing."
            exit 0
          fi
          echo "✅ No leaks found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
