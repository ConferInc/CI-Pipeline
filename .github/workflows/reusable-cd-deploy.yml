# Reusable CD: build Docker image, push to GHCR, trigger Coolify deploy.
# Only call this from a push-to-main context (gate with `if:` in the caller).
#
# Required secret (in caller or org): COOLIFY_DEPLOY_WEBHOOK_URL
# Uses GITHUB_TOKEN (built-in) for GHCR push — no PAT needed.

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name on GHCR (e.g. nutrition-backend)
        type: string
        required: true
      context:
        description: Docker build context path (relative to repo root)
        type: string
        default: "."
      dockerfile:
        description: Path to Dockerfile (relative to repo root)
        type: string
        default: "Dockerfile"
      build-args:
        description: Multiline KEY=value build args (optional)
        type: string
        default: ""
      health-check-url:
        description: >
          HTTPS URL to poll after deploy to confirm the service is up
          (e.g. https://api.example.com/healthz). Leave empty to skip.
        type: string
        default: ""
    secrets:
      COOLIFY_DEPLOY_WEBHOOK_URL:
        description: Coolify deploy webhook URL for this application (e.g. https://coolify.confer.today/api/v1/deploy?uuid=...&force=false)
        required: true
      COOLIFY_API_TOKEN:
        description: Coolify API token (from Keys & Tokens in Coolify sidebar)
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      sha-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}

      - name: Summary
        run: |
          echo "### Image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Trigger Coolify deploy
    needs: [publish]
    runs-on: ubuntu-latest

    steps:
      - name: POST deploy webhook
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            -X POST "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Coolify webhook response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Coolify deploy webhook returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Health check
        if: inputs.health-check-url != ''
        run: |
          URL="${{ inputs.health-check-url }}"
          echo "Polling $URL for up to 5 minutes..."
          for i in $(seq 1 20); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "$URL" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Health check passed (attempt $i, HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/20 — HTTP $CODE, retrying in 15s..."
            sleep 15
          done
          echo "::error::Health check timed out after 5 minutes"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "### Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
