# Reusable CI for Python (optional ruff, mypy, pytest, secret scan).
# Caller: uses: org/CI-Pipeline/.github/workflows/reusable-python-ci.yml@main

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        type: string
        default: "3.11"
      working-directory:
        description: Directory for ruff/mypy/pytest runs (relative to repo root)
        type: string
        default: "."
      requirements-file:
        description: Requirements file path (relative to repo root)
        type: string
        default: "requirements.txt"
      run-ruff:
        description: Run ruff check (installs ruff via pip)
        type: boolean
        default: false
      run-mypy:
        description: Run mypy (installs mypy via pip)
        type: boolean
        default: false
      mypy-targets:
        description: Paths/args passed to mypy
        type: string
        default: "."
      run-pytest:
        description: Run pytest
        type: boolean
        default: false
      pytest-targets:
        description: Extra arguments for pytest (e.g. tests/ -q)
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: ${{ inputs.requirements-file }}

      - name: Install dependencies
        run: pip install -r "$GITHUB_WORKSPACE/${{ inputs.requirements-file }}"

      - name: Ruff
        if: inputs.run-ruff
        run: |
          pip install "ruff>=0.4"
          ruff check .

      - name: Mypy
        if: inputs.run-mypy
        run: |
          pip install "mypy>=1.8"
          mypy ${{ inputs.mypy-targets }}

      - name: Pytest
        if: inputs.run-pytest
        run: |
          pip install "pytest>=7"
          pytest ${{ inputs.pytest-targets }}

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          # Install gitleaks
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          tar xzf gitleaks_8.24.3_linux_x64.tar.gz
          
          # Scan — exit code 1 = leaks found, 0 = clean
          # Capture exit code to handle stderr noise from git
          EXIT_CODE=0
          ./gitleaks detect --source=. --verbose || EXIT_CODE=$?
          
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "::error::Gitleaks found secrets in this repository!"
            exit 1
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "::warning::Gitleaks encountered an error (exit 2), but no leaks were found. Continuing."
            exit 0
          fi
          
          echo "✅ No leaks found"
