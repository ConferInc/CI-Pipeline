# Validate Docker image builds (no registry push; BuildKit cache).
# Caller: uses: org/CI-Pipeline/.github/workflows/reusable-docker-validate.yml@main
#
# For Next.js frontends, pass build-args (e.g. NEXT_PUBLIC_*) via the build-args input.

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context path (relative to repo root)
        type: string
        default: "."
      dockerfile:
        description: Path to Dockerfile (relative to repo root)
        type: string
        default: "Dockerfile"
      build-args:
        description: Multiline KEY=value build-args (optional)
        type: string
        default: ""

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ci:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ inputs.build-args }}
